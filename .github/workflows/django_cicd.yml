  migrate_db:
    name: Perform db migrations
    needs: [build_image]
    # if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-22.04
    # services:
    #   db:
    #     image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.12.0
    #     ports:
    #     - 5432:5432
    #     env:
    #       POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
    #       POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
    #       POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.IMAGE_NAME }}
        path: /tmp
    - name: Load image
      run: |
        docker load --input /tmp/${{ env.IMAGE_NAME }}.tar
    # - name: Configure Google Cloud SQL Auth Proxy
    #   uses: mattes/gce-cloudsql-proxy-action@v1
    #   with:
    #     creds: ${{ secrets.GCP_GITHUB_SA }}
    #     instance: ${{ vars.CLOUD_SQL_INSTANCE }}
    - name: Store secret in filesystem
      env:
        GCP_GITHUB_SA: ${{ secrets.GCP_GITHUB_SA }}
      run: |
        echo $GCP_GITHUB_SA > cloud_sql_credentials.json
    - name: Configure Google Cloud SQL Auth Proxy
      uses: addnab/docker-run-action@v3
      with:
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.12.0
        run: --address 0.0.0.0 --credentials-file /cloud_sql_credentials.json ${{ vars.CLOUD_SQL_INSTANCE }}
        options: -v cloud_sql_credentials.json:/cloud_sql_credentials.json -p 127.0.0.1:5432:5432
    - name: Run migrations
      uses: addnab/docker-run-action@v3
      with:
        image: ${{ vars.AR_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_NAME }}
        run: python manage.py migrate --no-input
        options: |
          -e SECRET_KEY=${{ secrets.SECRET_KEY }}
          -e DATABASE_URL=${{ secrets.MIGRATION_DATABASE_URL }}

  collect_statics:
    name: Collect static files into GCS
    needs: [build_image]
    # if: needs.changes.outputs.statics == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.IMAGE_NAME }}
        path: /tmp
    - name: Load image
      run: |
        docker load --input /tmp/${{ env.IMAGE_NAME }}.tar
    - name: Collect static files to GCS
      uses: addnab/docker-run-action@v3
      with:
        image: ${{ vars.AR_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_NAME }}
        run: python manage.py collectstatic --no-input
        options: |
          -e SECRET_KEY=${{ secrets.SECRET_KEY }}
          -e DATABASE_URL=psql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD}}@db:5432/${{ secrets.POSTGRES_DB }}
          -e USE_GCS_STATICS=True
          -e GCS_BUCKET_STATICS=${{ vars.GCS_BUCKET_STATICS }}
          -e GCP_GITHUB_SA=${{ secrets.GCP_GITHUB_SA }}

