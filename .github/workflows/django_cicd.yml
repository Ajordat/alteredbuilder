  remove-image:
    name: Delete Github artifact
    if: always()
    runs-on: ubuntu-latest
    needs: [ collect_statics, migrate_db ]
    steps:
      - uses: geekyeggo/delete-artifact@v2
        with:
          name: ${{ env.IMAGE_NAME }}